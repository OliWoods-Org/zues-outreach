# apps/zeus-web — build, lint, Playwright
name: Zeus web CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/zeus-web/**'
      - '.github/workflows/zeus-web-ci.yml'
  pull_request:
    paths:
      - 'apps/zeus-web/**'
      - '.github/workflows/zeus-web-ci.yml'

concurrency:
  group: zeus-web-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/zeus-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # ESLint 10 requires Node ^20.19 || ^22.13 || >=24; pin 22 LTS for CI stability.
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/zeus-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
